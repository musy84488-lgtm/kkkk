<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواعيدي - خطوة وشفاء</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <a href="../../index.html" class="logo-text">خطوة وشفاء</a>
        <div class="logo-icon">
            <i class="fas fa-shoe-prints"></i>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
            <a href="../../index.html" class="logo-text" style="font-size:18px;">خطوة وشفاء</a>
        </div>
        <nav class="sidebar-nav">
            <a href="../../index.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="profile.html"><i class="fas fa-user-md"></i> بروفايلي</a>
            <a href="appointments.html" class="active"><i class="fas fa-calendar-alt"></i> مواعيدي</a>
            <a href="patients.html"><i class="fas fa-users"></i> مرضاي</a>
            <a href="treatment-plans.html"><i class="fas fa-clipboard-list"></i> الخطط العلاجية</a>
            <a href="../../pages/support.html"><i class="fas fa-headset"></i> الدعم الفني</a>
        </nav>
    </div>

    <div class="page-header">
        <h1>مواعيدي</h1>
        <p>إدارة جلساتك ومواعيدك مع المرضى</p>
    </div>

    <div style="padding:20px;max-width:600px;margin:0 auto;">
        <div style="display:flex;gap:10px;margin-bottom:20px;">
            <button class="admin-btn admin-btn-primary" style="flex:1;">اليوم</button>
            <button class="admin-btn" style="flex:1;background:var(--bg);color:var(--dark);">الأسبوع</button>
            <button class="admin-btn" style="flex:1;background:var(--bg);color:var(--dark);">الشهر</button>
        </div>

        <div class="appointment-card confirmed">
            <div class="appointment-header">
                <div class="appointment-patient">أحمد محمد</div>
                <span class="appointment-status" style="background:rgba(0,168,107,0.1);color:#00a86b;">مؤكد</span>
            </div>
            <div class="appointment-details">
                <div class="appointment-detail">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>دمشق - المزة</span>
                </div>
                <div class="appointment-detail">
                    <i class="fas fa-clock"></i>
                    <span>10:00 صباحاً</span>
                </div>
                <div class="appointment-detail">
                    <i class="fas fa-bone"></i>
                    <span>عظام وعمود فقري</span>
                </div>
            </div>
            <div class="appointment-actions">
                <button class="admin-btn admin-btn-primary" onclick="updateAppointmentStatus(1, 'completed')">
                    <i class="fas fa-check-double"></i> تم الإنجاز
                </button>
                <button class="admin-btn" style="background:var(--bg);color:var(--dark);">
                    <i class="fas fa-clipboard-list"></i> سجل الجلسة
                </button>
            </div>
        </div>

        <div class="appointment-card pending">
            <div class="appointment-header">
                <div class="appointment-patient">فاطمة علي</div>
                <span class="appointment-status" style="background:rgba(245,158,11,0.1);color:#f59e0b;">بانتظار التأكيد</span>
            </div>
            <div class="appointment-details">
                <div class="appointment-detail">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>دمشق - المalki</span>
                </div>
                <div class="appointment-detail">
                    <i class="fas fa-clock"></i>
                    <span>2:00 مساءً</span>
                </div>
                <div class="appointment-detail">
                    <i class="fas fa-brain"></i>
                    <span>أعصاب وشلل</span>
                </div>
            </div>
            <div class="appointment-actions">
                <button class="admin-btn admin-btn-success" onclick="updateAppointmentStatus(2, 'confirmed')">
                    <i class="fas fa-check"></i> تأكيد
                </button>
                <button class="admin-btn admin-btn-danger" onclick="updateAppointmentStatus(2, 'cancelled')">
                    <i class="fas fa-times"></i> رفض
                </button>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
