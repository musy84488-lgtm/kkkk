<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المعالجين - خطوة وشفاء</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-header-logo">
                <div class="logo-icon" style="width:32px;height:32px;font-size:16px;">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <h1>إدارة المعالجين</h1>
            </div>
            <button class="admin-logout" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i>
                خروج
            </button>
        </div>

        <div style="padding:20px;max-width:1200px;margin:0 auto;">
            <div class="admin-card">
                <div class="admin-card-header">
                    <div class="admin-card-title">
                        <i class="fas fa-user-md" style="color:var(--primary);margin-left:8px;"></i>
                        قائمة المعالجين المسجلين
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <button class="admin-btn admin-btn-primary" onclick="exportTherapistsCSV()" style="font-size:13px;">
                            <i class="fas fa-file-csv"></i>
                            تصدير CSV
                        </button>
                        <a href="dashboard.html" style="color:var(--primary);font-size:14px;text-decoration:none;">
                            <i class="fas fa-arrow-right"></i>
                            العودة
                        </a>
                    </div>
                </div>

                <!-- Filter Bar -->
                <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
                    <button class="filter-btn active" onclick="filterTherapists('all', this)">الكل</button>
                    <button class="filter-btn" onclick="filterTherapists('pending', this)">
                        بانتظار التفعيل <span id="filterBadgePending" class="filter-badge"></span>
                    </button>
                    <button class="filter-btn" onclick="filterTherapists('approved', this)">معتمد</button>
                    <button class="filter-btn" onclick="filterTherapists('rejected', this)">مرفوض</button>
                    <button class="filter-btn" onclick="filterTherapists('suspended', this)">موقوف</button>
                </div>

                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                                <th>المحافظة</th>
                                <th>التخصص</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="therapistsTableBody">
                            <tr>
                                <td colspan="7" style="text-align:center;color:var(--gray);padding:40px;">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="requestModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9000;align-items:center;justify-content:center;padding:20px;">
        <div style="background:white;border-radius:var(--radius-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--gray-lighter);">
                <h3 style="font-size:18px;font-weight:800;">بيانات المعالج</h3>
                <button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="requestModalBody" style="padding:20px;"></div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        let currentFilter = 'all';

        function filterTherapists(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const therapists = getTherapists();
            const filtered = status === 'all' ? therapists : therapists.filter(t => t.status === status);
            renderTherapistsTable(filtered);
        }

        function renderTherapistsTable(therapists) {
            const tbody = document.getElementById('therapistsTableBody');
            if (!tbody) return;

            if (therapists.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--gray);padding:40px;">
                    <i class="fas fa-user-md" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.4;"></i>
                    لا توجد سجلات في هذا القسم
                </td></tr>`;
                return;
            }

            tbody.innerHTML = therapists.map((t, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>
                        <div style="font-weight:600;">${t.name}</div>
                        <div style="font-size:11px;color:var(--gray-light);">${t.date}</div>
                    </td>
                    <td>${t.phone}</td>
                    <td>${t.provinceLabel || t.province}</td>
                    <td>${t.specialtyLabel}</td>
                    <td><span class="admin-badge ${getTherapistStatusClass(t.status)}">${getTherapistStatusLabel(t.status)}</span></td>
                    <td>
                        <div style="display:flex;flex-direction:column;gap:4px;">
                            <button class="admin-btn admin-btn-sm admin-btn-primary" onclick="viewTherapist(${t.id})">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            ${t.status === 'pending' ? `
                                <button class="admin-btn admin-btn-sm admin-btn-success" onclick="approveTherapist(${t.id});renderTherapistsTable(getTherapists())">تفعيل</button>
                                <button class="admin-btn admin-btn-sm admin-btn-danger" onclick="rejectTherapist(${t.id});renderTherapistsTable(getTherapists())">رفض</button>
                            ` : t.status === 'approved' ? `
                                <button class="admin-btn admin-btn-sm admin-btn-danger" onclick="suspendTherapist(${t.id});renderTherapistsTable(getTherapists())">تعطيل</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function exportTherapistsCSV() {
            const therapists = getTherapists();
            if (therapists.length === 0) { showNotification('لا توجد بيانات للتصدير', 'error'); return; }

            const headers = ['الاسم', 'الهاتف', 'المحافظة', 'المنطقة', 'التخصص', 'زيارات منزلية', 'الحالة', 'التاريخ'];
            const rows = therapists.map(t => [
                t.name, t.phone, t.provinceLabel, t.area, t.specialtyLabel,
                t.homeVisit ? 'نعم' : 'لا', getTherapistStatusLabel(t.status), t.date
            ]);

            const csvContent = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'معالجون-خطوة-وشفاء-' + new Date().toLocaleDateString('en') + '.csv';
            a.click();
            URL.revokeObjectURL(url);
            showNotification('تم تصدير الملف', 'success');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const all = getTherapists();
            renderTherapistsTable(all);

            const pendingCount = all.filter(t => t.status === 'pending').length;
            const badge = document.getElementById('filterBadgePending');
            if (badge && pendingCount > 0) {
                badge.textContent = pendingCount;
                badge.style.display = 'inline-flex';
            }
        });
    </script>
</body>
</html>
