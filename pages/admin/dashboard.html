<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - خطوة وشفاء</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Admin Header -->
        <div class="admin-header">
            <div class="admin-header-logo">
                <div class="logo-icon" style="width:32px;height:32px;font-size:16px;">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <h1>لوحة الإدارة</h1>
            </div>
            <button class="admin-logout" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i>
                خروج
            </button>
        </div>

        <div style="padding:20px;max-width:1200px;margin:0 auto;">
            <!-- Stats Cards -->
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;">
                <div class="admin-card">
                    <div class="admin-stat">
                        <div class="admin-stat-icon blue">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="admin-stat-info">
                            <h4 id="statTotal">0</h4>
                            <p>إجمالي الطلبات</p>
                        </div>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="admin-stat">
                        <div class="admin-stat-icon orange">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="admin-stat-info">
                            <h4 id="statNew">0</h4>
                            <p>بانتظار المراجعة</p>
                        </div>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="admin-stat">
                        <div class="admin-stat-icon green">
                            <i class="fas fa-heartbeat"></i>
                        </div>
                        <div class="admin-stat-info">
                            <h4 id="statInProgress">0</h4>
                            <p>قيد العلاج</p>
                        </div>
                    </div>
                </div>
                <div class="admin-card">
                    <div class="admin-stat">
                        <div class="admin-stat-icon red">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div class="admin-stat-info">
                            <h4 id="statToday">0</h4>
                            <p>طلبات اليوم</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="admin-card" style="margin-bottom:20px;">
                <div class="admin-card-header">
                    <div class="admin-card-title">إجراءات سريعة</div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
                    <a href="patients.html" class="profile-menu-item" style="text-decoration:none;position:relative;">
                        <i class="fas fa-users"></i>
                        <span>إدارة الطلبات</span>
                        <span id="adminNotifBadge" style="display:none;background:var(--danger);color:white;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;align-items:center;justify-content:center;position:absolute;top:8px;left:8px;"></span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <a href="therapists.html" class="profile-menu-item" style="text-decoration:none;">
                        <i class="fas fa-user-md"></i>
                        <span>إدارة المعالجين</span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <a href="appointments.html" class="profile-menu-item" style="text-decoration:none;">
                        <i class="fas fa-calendar-alt"></i>
                        <span>المواعيد</span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <a href="treatment-plans.html" class="profile-menu-item" style="text-decoration:none;">
                        <i class="fas fa-clipboard-list"></i>
                        <span>الخطط العلاجية</span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <a href="settings.html" class="profile-menu-item" style="text-decoration:none;">
                        <i class="fas fa-cog"></i>
                        <span>إعدادات المنصة</span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <a href="founders.html" class="profile-menu-item" style="text-decoration:none;">
                        <i class="fas fa-id-card"></i>
                        <span>إدارة المؤسسين</span>
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </div>
            </div>

            <!-- Recent Requests -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <div class="admin-card-title">
                        <i class="fas fa-bell" style="color:var(--primary);margin-left:8px;"></i>
                        آخر الطلبات
                    </div>
                    <a href="patients.html" style="color:var(--primary);font-size:14px;text-decoration:none;">عرض الكل</a>
                </div>
                <div style="overflow-x:auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>المحافظة</th>
                                <th>التخصص</th>
                                <th>الحالة</th>
                                <th>الإجراء</th>
                            </tr>
                        </thead>
                        <tbody id="recentRequestsBody">
                            <tr>
                                <td colspan="5" style="text-align:center;color:var(--gray);padding:30px;">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
