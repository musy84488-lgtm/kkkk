<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - خطوة وشفاء</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <i class="fas fa-shoe-prints"></i>
                </div>
                <h2>خطوة وشفاء</h2>
                <p>لوحة إدارة المنصة</p>
            </div>

            <form onsubmit="adminLogin(event)">
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="أدخل كلمة المرور" required>
                </div>

                <button type="submit" class="btn btn-action" style="margin-bottom:16px;">
                    <i class="fas fa-sign-in-alt"></i>
                    دخول
                </button>

                <div style="text-align:center;">
                    <a href="#" onclick="showPasswordReset(); return false;" style="color:var(--primary);font-size:14px;text-decoration:none;">
                        <i class="fas fa-key"></i>
                        نسيت كلمة المرور / تغيير كلمة المرور
                    </a>
                </div>

                <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--gray-lighter);text-align:center;">
                    <p style="font-size:13px;color:var(--gray);margin-bottom:8px;">للاستفسارات التقنية:</p>
                    <a href="https://wa.me/963938626949" target="_blank" style="color:#25d366;font-size:14px;text-decoration:none;font-weight:600;">
                        <i class="fab fa-whatsapp"></i>
                        +963 938 626 949
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
