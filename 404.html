<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة - خطوة وشفاء</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0066a1">
    <link rel="icon" href="images/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 24px; text-align: center; overflow: hidden; }
        .error-number { font-size: 120px; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; position: relative; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-12px); } }
        .error-icon { font-size: 48px; margin-bottom: 16px; animation: wobble 2s ease-in-out infinite; display: block; }
        @keyframes wobble { 0%,100%{ transform: rotate(-8deg); } 50%{ transform: rotate(8deg); } }
        .error-title { font-size: 24px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        .error-sub { font-size: 15px; color: var(--gray); margin-bottom: 36px; max-width: 340px; line-height: 1.8; }
        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 420px; margin-bottom: 24px; }
        .quick-link { background: white; border: 1px solid var(--gray-lighter); border-radius: var(--radius); padding: 16px 12px; text-decoration: none; color: var(--dark); font-size: 14px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all .2s; box-shadow: var(--shadow-sm); }
        .quick-link i { font-size: 24px; color: var(--primary); }
        .quick-link:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); color: var(--primary); }
        .bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.06; background: var(--primary); }
        .shape-1 { width: 300px; height: 300px; top: -100px; right: -100px; }
        .shape-2 { width: 200px; height: 200px; bottom: -60px; left: -60px; }
        .shape-3 { width: 150px; height: 150px; top: 40%; left: 5%; }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <span class="error-icon">🔍</span>
    <div class="error-number">404</div>
    <div class="error-title">الصفحة غير موجودة</div>
    <div class="error-sub">يبدو أن الصفحة التي تبحث عنها لم تعد موجودة أو تم نقلها</div>

    <div class="links-grid">
        <a href="index.html" class="quick-link">
            <i class="fas fa-home"></i>
            الرئيسية
        </a>
        <a href="pages/request.html" class="quick-link">
            <i class="fas fa-hand-holding-medical"></i>
            اطلب معالجاً
        </a>
        <a href="pages/track.html" class="quick-link">
            <i class="fas fa-map-marker-alt"></i>
            تتبع طلبك
        </a>
        <a href="pages/support.html" class="quick-link">
            <i class="fas fa-headset"></i>
            الدعم الفني
        </a>
    </div>

    <a href="index.html" class="btn btn-action" style="max-width:300px;width:100%;">
        <i class="fas fa-arrow-right"></i>
        العودة للصفحة الرئيسية
    </a>

    <div style="margin-top:28px;font-size:13px;color:var(--gray);">
        إذا كنت تعتقد أن هذا خطأ في الموقع
        <a href="pages/support.html" style="color:var(--primary);font-weight:700;">تواصل معنا</a>
    </div>
</body>
</html>
