<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1BADD8"/>
      <stop offset="100%" stop-color="#004F8A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- الخلفية -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

  <!-- شخص يمشي — أشكال بسيطة ونظيفة -->

  <!-- الرأس -->
  <circle cx="185" cy="100" r="56" fill="white" filter="url(#shadow)"/>

  <!-- الجسم مائل للأمام قليلاً -->
  <rect x="158" y="158" width="60" height="118" rx="30" fill="white" transform="rotate(-7 188 217)"/>

  <!-- الذراع الأمامي (يتأرجح للأمام) -->
  <rect x="210" y="160" width="36" height="95" rx="18" fill="white" transform="rotate(-38 228 207)"/>

  <!-- الذراع الخلفي (يتأرجح للخلف) -->
  <rect x="128" y="162" width="36" height="95" rx="18" fill="white" transform="rotate(32 146 209)"/>

  <!-- الساق الأمامية (للأمام-اليسار) -->
  <rect x="148" y="270" width="44" height="148" rx="22" fill="white" transform="rotate(-22 170 344)"/>

  <!-- القدم الأمامية -->
  <ellipse cx="112" cy="414" rx="38" ry="16" fill="white" transform="rotate(-18 112 414)"/>

  <!-- الساق الخلفية (للخلف-اليمين) -->
  <rect x="208" y="270" width="44" height="148" rx="22" fill="white" transform="rotate(18 230 344)"/>

  <!-- القدم الخلفية -->
  <ellipse cx="266" cy="406" rx="30" ry="13" fill="white" transform="rotate(10 266 406)"/>

  <!-- شارة طبية — دائرة بيضاء مع صليب أزرق -->
  <circle cx="388" cy="118" r="78" fill="white" filter="url(#shadow)"/>
  <rect x="356" y="104" width="64" height="20" rx="10" fill="#0066a1"/>
  <rect x="368" y="92" width="20" height="64" rx="10" fill="#0066a1"/>
</svg>
